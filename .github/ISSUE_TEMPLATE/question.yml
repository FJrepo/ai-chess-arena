name: Question
description: Ask a usage or development question
title: "question: "
labels:
  - question
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Ask your question clearly.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Commands, links, or code snippets you've already checked.
