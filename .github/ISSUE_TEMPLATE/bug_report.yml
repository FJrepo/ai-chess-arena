name: Bug Report
description: Report a defect or regression
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps to reproduce the issue.
      placeholder: |
        1. Start services with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Java, Node, Docker versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or screenshots. Do not include secrets.
