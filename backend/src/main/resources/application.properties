# OpenRouter
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.base-url=https://openrouter.ai/api/v1
openrouter.featured-providers=openai,anthropic,google,x-ai,meta-llama,deepseek,mistralai,qwen,cohere
openrouter.provider-order=openai,anthropic,google,x-ai,meta-llama,deepseek,mistralai,qwen,cohere
openrouter.featured-keywords=gpt,claude,gemini,llama,grok,deepseek,mistral,qwen,command
openrouter.excluded-model-keywords=embedding,embeddings,rerank,moderation,transcription,speech,tts,image,vision,audio,video,search
openrouter.validate-participant-models=true
openrouter.model-validation-fail-open=true

# Game defaults
game.default-move-timeout-seconds=60
game.default-max-retries=3
game.default-trash-talk-enabled=true
game.default-temperature=0.7
game.default-max-tokens=500

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:chess_tournament}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# Dev profile convenience only; default runtime requires explicit DB credentials.
%dev.quarkus.datasource.username=${DB_USER:chess}
%dev.quarkus.datasource.password=${DB_PASSWORD:chess}

# Server port
quarkus.http.port=${HTTP_PORT:8081}
quarkus.application.version=0.9.10

# CORS (for Angular dev server)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200,http://localhost
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition

# Jackson
quarkus.jackson.serialization-inclusion=non-null

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.aichessarena".level=DEBUG
