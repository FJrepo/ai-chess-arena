services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-chess_tournament}
      POSTGRES_USER: ${DB_USER:-chess}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chess}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chess} -d ${DB_NAME:-chess_tournament}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${IMAGE_NAMESPACE:?set IMAGE_NAMESPACE}/chess-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-chess_tournament}
      DB_USER: ${DB_USER:-chess}
      DB_PASSWORD: ${DB_PASSWORD:-chess}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY}
      HTTP_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/q/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/${IMAGE_NAMESPACE:?set IMAGE_NAMESPACE}/chess-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata_prod:
